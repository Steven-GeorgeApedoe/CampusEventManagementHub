<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Event Hub - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-white text-2xl font-bold">Campus Event Hub</h1>
            <div class="space-x-4">
                <a href="eventList.html" class="text-white hover:text-blue-200">Explore Events</a>
                <a href="profile.html" class="text-white hover:text-blue-200">Profile</a>
                <button onclick="logout()" class="text-white hover:text-blue-200">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <h2 class="text-3xl font-bold mb-6">Welcome to Campus Event Hub</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-xl font-bold mb-4">Upcoming Events</h3>
                <p class="mb-4">Discover exciting events happening on campus!</p>
                <a href="eventList.html" class="inline-block bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Explore Events
                </a>
            </div>
        </div>
    </main>

    <script src="js/auth-check.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
