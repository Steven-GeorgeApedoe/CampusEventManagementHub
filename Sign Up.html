<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <title>Sign Up</title>
</head>

<body class="bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 min-h-screen">

<!-- Sign-Up Form Container -->
<div class="flex items-center justify-center min-h-screen pt-24"> <!-- pt-24 to avoid navbar overlap -->
  <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
    <h2 class="text-3xl font-bold text-center text-gray-700 mb-6">Create an Account</h2>

    <form action="#" method="POST" class="space-y-4">
      <!-- Full Name -->
      <div>
        <label for="fullname" class="block text-gray-600 font-medium">Full Name</label>
        <input
          type="text"
          id="fullname"
          name="fullname"
          class="mt-1 block w-full rounded-md border-black shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm p-2"
          placeholder="Enter your full name"
          required>
      </div>

      <!-- Email Address -->
      <div>
        <label for="email" class="block text-gray-600 font-medium">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="mt-1 block w-full rounded-md border-black shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm p-2"
          placeholder="Enter your email"
          required>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-gray-600 font-medium">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="mt-1 block w-full rounded-md border-black shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm p-2"
          placeholder="Enter your password"
          required>
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm-password" class="block text-gray-600 font-medium">Confirm Password</label>
        <input
          type="password"
          id="confirm-password"
          name="confirm-password"
          class="mt-1 block w-full rounded-md border-black shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm p-2"
          placeholder="Re-enter your password"
          required>
      </div>

      <!-- Role Dropdown -->
      <div>
        <label for="role" class="block text-gray-600 font-medium">What is your Role?</label>
        <select
          id="role"
          name="role"
          class="mt-1 block w-full rounded-md border-black shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm p-2"
          required>
          <option value="student">Student</option>
          <option value="administrator">Administrator</option>
        </select>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition ease-in-out duration-300 transform hover:scale-105">
        Sign Up
      </button>
    </form>

    <!-- Already have an account -->
    <p class="mt-6 text-center text-sm text-gray-600">
      Already have an account?
      <a href="login.html" class="text-indigo-500 hover:underline-blue">Login</a>
    </p>
  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>

</body>
</html>
