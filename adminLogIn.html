<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Boxicons for icons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body class=" bg-gradient-to-r from-blue-500 via red-200 to-green-400 bg-cover bg-center h-screen flex justify-center items-center" >

<!-- Login Form Container -->
<div class="bg-white bg-opacity-80 p-8 rounded-lg shadow-lg max-w-sm w-full">
  <h2 class="text-2xl font-semibold text-center mb-6">Enter your Details</h2>

  <!-- Login Form -->
  <form action="" method="POST">
    <!-- Email Input -->
    <div class="mb-4 flex items-center border rounded-lg overflow-hidden">
      <span class="px-4 py-2 bg-gray-200 text-gray-600"><i class='bx bx-mail-send'></i></span>
      <input
        type="email"
        class="form-input w-full py-2 px-3 text-gray-700"
        placeholder="Email"
        required>
    </div>

    <!-- Password Input -->
    <div class="mb-4 flex items-center border rounded-lg overflow-hidden">
      <span class="px-4 py-2 bg-gray-200 text-gray-600"><i class='bx bx-lock'></i></span>
      <input
        type="password"
        class="form-input w-full py-2 px-3 text-gray-700"
        placeholder="Password"
        required>
    </div>

    <!-- Login Button -->
    <button
      type="submit" class="w-full py-2 px-4 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-all duration-300 transform hover:scale-105">
      Login
    </button>
    <p class="mt-6 text-center text-sm text-gray-600">
      Don't have an Account?
      <a href="Sign Up.html" class="text-indigo-500 hover:underline ">Sign Up </a>
    </p>
  </form>
</div>

</body>
</html>
