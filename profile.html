<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Campus Event Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-white text-2xl font-bold">Campus Event Hub</h1>
            <div class="space-x-4">
                <a href="Home.html" class="text-white hover:text-blue-200">Home</a>
                <a href="eventList.html" class="text-white hover:text-blue-200">Events</a>
                <a href="profile.html" class="text-white hover:text-blue-200">Profile</a>
                <button onclick="logout()" class="text-white hover:text-blue-200">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-3xl font-bold mb-6">User Profile</h2>
            <div id="profileInfo" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Username:</label>
                    <p id="username" class="text-gray-600"></p>
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Email:</label>
                    <p id="email" class="text-gray-600"></p>
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Role:</label>
                    <p id="role" class="text-gray-600"></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth-check.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
